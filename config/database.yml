# Configuración de base de datos para Rails + PostgreSQL
# Compatible con Railway, Heroku, Render y cualquier PaaS que use DATABASE_URL
#
# IMPORTANTE: No modificar la estructura de production.
# Si necesitas múltiples bases de datos, consulta DEPLOYMENT.md

default: &default
  adapter: postgresql
  encoding: unicode
  pool: <%= ENV.fetch("RAILS_MAX_THREADS", 5) %>
  url: <%= ENV["DATABASE_URL"] %>

development:
  <<: *default
  database: pedometer_api_development

test:
  <<: *default
  database: pedometer_api_test

production:
  <<: *default
